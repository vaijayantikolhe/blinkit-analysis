name: Deploy Blinkit PowerBI Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Power BI CLI
      run: |
        npm install -g powerbi-cli
        echo "$(npm bin -g)" >> $GITHUB_PATH

    - name: Verify CLI Installation
      run: pbicli --version

    - name: Login to Power BI
      run: |
        pbicli login --service-principal \
        -u ${{ secrets.PBI_CLIENT_ID }} \
        -p ${{ secrets.PBI_CLIENT_SECRET }} \
        -t ${{ secrets.PBI_TENANT_ID }}

    - name: Deploy Power BI Dashboard
      run: |
        pbicli import pbix \
        --file dashboard/blinkit_dashboard.pbix \
        --workspace ${{ secrets.PBI_WORKSPACE_ID }}
